# 公共配置文件
# @author <a href="https://github.com/liyupi">程序员鱼皮</a>
# @from <a href="https://yupi.icu">编程导航知识星球</a>
spring:
  application:
    name: yuapi-backend
  devtools:
    restart:
      enabled: false
  # DataSource Config
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/api
    username: root
    password: Wei.1234
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  # session 配置（开发环境先用内存，避免 Redis 问题导致登录态丢失）
  session:
    timeout: 86400
    store-type: none
#   如需启用 Redis Session，可按需恢复下面配置
  redis:
     port: 6379
     host: localhost
     database: 0
     password: Wei@123redis
server:
  port: 7529
  servlet:
    context-path: /api
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)
# 这段配置仅供测试，实际应该根据登录用户获取对应的 ak、sk
yuapi:
  inner-token: yuapi-inner-token
  client:
    access-key: yupi
    secret-key: abcdefgh
dubbo:
  application:
    name: yuapi-backend-provider
    qos-enable: false
    register-mode: interface
    service-discovery:
      migration: FORCE_INTERFACE
  consumer:
    check: false
  protocol:
    name: dubbo
    port: -1
  registry:
    id: nacos-registry
    address: nacos://localhost:8848
