# 公共配置文件
# @author <a href="https://github.com/liyupi">程序员鱼皮</a>
# @from <a href="https://yupi.icu">编程导航知识星球</a>
spring:
  application:
    name: api-backend
  devtools:
    restart:
      enabled: false
  # DataSource Config
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${API_DB_URL:jdbc:mysql://localhost:3306/api}
    username: ${API_DB_USERNAME:root}
    password: ${API_DB_PASSWORD:Wei.1234}
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  # session 配置（开发环境先用内存，避免 Redis 问题导致登录态丢失）
  session:
    timeout: 86400
    store-type: none
#   如需启用 Redis Session，可按需恢复下面配置
  redis:
     port: ${API_REDIS_PORT:6379}
     host: ${API_REDIS_HOST:localhost}
     database: ${API_REDIS_DATABASE:0}
     password: ${API_REDIS_PASSWORD:Wei@123redis}
server:
  port: 7529
  servlet:
    context-path: /api
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)
# 这段配置仅供测试，实际应该根据登录用户获取对应的 ak、sk
api:
  inner-token: ${API_INNER_TOKEN:api-inner-token}
  client:
    access-key: ${API_CLIENT_ACCESS_KEY:yupi}
    secret-key: ${API_CLIENT_SECRET_KEY:abcdefgh}
dubbo:
  application:
    name: api-backend-provider
    qos-enable: false
    register-mode: interface
    service-discovery:
      migration: FORCE_INTERFACE
  consumer:
    check: false
  protocol:
    name: dubbo
    port: -1
  registry:
    id: nacos-registry
    address: nacos://localhost:8848
